spring:
  application:
    name: paybridge-user-service
  main:
    lazy-initialization: false
  datasource:
    url: ${SPRING_DATASOURCE_URL}
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
    database-platform: org.hibernate.dialect.PostgreSQLDialect

  kafka:
    bootstrap-servers: paybridge-kafka:9092
    admin:
      enabled: true

  data:
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT}
      password: ${REDIS_PASSWORD}
server:
  port: 8080

management:
  tracing:
    enabled: true
    sampling:
      probability: 1.0

  otlp:
    tracing:
      endpoint: http://paybridge-jaeger:4318/v1/traces

  endpoints:
    web:
      exposure:
        include: health, prometheus
  endpoint:
    health:
      show-details: always

jwt:
  secret-key: ${JWT_SECRET_KEY}
  ttl-ms: ${JWT_TTL}

tokens:
  internal-service: ${TOKEN_INTERNAL_SERVICE}
  transaction-service: ${TOKEN_TRANSACTION_SERVICE}
  notification-service: ${TOKEN_NOTIFICATION_SERVICE}

services:
  transaction:
    endpoint: ${TRANSACTION_SERVICE_ENDPOINT}
